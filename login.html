<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SIGE-IFPA Eventos</title>
    <style>
        :root {
            --primary: #003366;
            --secondary: #b30000;
            --accent: #f4f4f4;
            --text: #333;
            --white: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--accent);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        header {
            background-color: var(--primary);
            color: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--secondary);
        }
        
        header h1 {
            font-size: 1.5rem;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }
        
        nav a {
            color: var(--white);
            text-decoration: none;
            font-weight: bold;
        }
        
        nav a:hover {
            text-decoration: underline;
        }
        
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .login-container {
            background: var(--white);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        
        .login-container h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        .login-container p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        .profile-select {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .profile-option {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .profile-option:hover {
            border-color: var(--primary);
            background: #f0f4ff;
        }
        
        .profile-option.selected {
            border-color: var(--primary);
            background: #e0e7ff;
        }
        
        .profile-option input {
            display: none;
        }
        
        .profile-option .icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .profile-option .label {
            font-weight: bold;
            color: var(--primary);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn:hover {
            background-color: var(--secondary);
        }
        
        .btn-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
        
        .btn-link:hover {
            text-decoration: underline;
        }
        
        .forgot-password {
            display: block;
            text-align: right;
            margin-top: 10px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .forgot-password:hover {
            color: var(--primary);
            text-decoration: underline;
        }
        
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem;
        }
        
        @media (max-width: 600px) {
            .profile-select {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🎯 SIGE-IFPA Eventos</h1>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <h2>🔐 Acesso ao Sistema</h2>
            <p>Selecione seu perfil e faça login</p>
            
            <form id="loginForm">
                <div class="profile-select">
                    <label class="profile-option selected">
                        <input type="radio" name="perfil" value="participante" checked>
                        <div class="icon">👨‍🎓</div>
                        <div class="label">Participante</div>
                    </label>
                    <label class="profile-option">
                        <input type="radio" name="perfil" value="organizador">
                        <div class="icon">👨‍💼</div>
                        <div class="label">Organizador</div>
                    </label>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>
                
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
                
                <button type="submit" class="btn" style="margin-top: 20px;">Entrar</button>
                
                <a href="cadastro.html" class="btn-link">Não tem conta? Cadastre-se</a>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 SIGE-IFPA Eventos</p>
    </footer>

    <script>
        // Seleção visual do perfil
        document.querySelectorAll('.profile-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.profile-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                this.querySelector('input').checked = true;
            });
        });

        // Redirecionamento baseado no perfil
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const perfil = document.querySelector('input[name="perfil"]:checked').value;
            
            // Validação simples
            if(!email || !password) {
                alert('⚠️ Por favor, preencha e-mail e senha!');
                return;
            }
            
            // Simula login bem-sucedido
            alert('✅ Login realizado com sucesso!\n\nBem-vindo(a), ' + email);
            
            // Redireciona baseado no perfil selecionado
            if(perfil === 'organizador') {
                window.location.href = 'organizador/dashboard.html';
            } else {
                window.location.href = 'participante/dashboard.html';
            }
        });
    </script>
</body>
</html>
